<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaliCoach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>💪 CaliCoach</h1>
  <p class="subtitle">Jouw persoonlijke calisthenics coach</p>

  <div class="card">
    <h2>Week 1 - Training A</h2>

    <label><input type="checkbox"> Push-ups - 3 × 10</label><br><br>
    <label><input type="checkbox"> Squats - 3 × 15</label><br><br>
    <label><input type="checkbox"> Glute Bridge - 3 × 15</label><br><br>
    <label><input type="checkbox"> Plank - 3 × 30 sec</label>

    <button id="timerButton">Start training</button>

    <h3 id="timer">Klaar om te beginnen?</h3>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
